name: heimcall-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: incident
      POSTGRES_PASSWORD: incident
      POSTGRES_DB: incident
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      # PLAINTEXT:9092 serves host clients (the services on the host). DOCKER:29092 serves other
      # containers on this compose network (kafka-ui), advertised under the service name.
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,DOCKER://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,DOCKER://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Must be a base64-encoded 16-byte UUID (kafka-storage random-uuid format).
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  kafka-ui:
    image: kafbat/kafka-ui:latest
    ports:
      - "8090:8080"   # web UI -> http://localhost:8090
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: heimcall-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI

  # Phase 8 T4: trace backend. Services export OTLP/HTTP to :4318; view traces at http://localhost:16686.
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # web UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP (Boot's default exporter transport)

  # Phase 8 T4c: metrics scraper. Scrapes the host-run services' /actuator/prometheus.
  # network_mode: host so it reaches the services on localhost:808x directly. A firewalld host
  # (the local dev box) drops docker-bridge->host packets, so bridge + host.docker.internal can't
  # scrape host-run services; host networking sidesteps that. Linux-only (fine for local dev).
  # Web UI -> http://localhost:9090
  prometheus:
    image: prom/prometheus:v2.53.0
    network_mode: host
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # Phase 8 T4c: dashboards. Auto-provisioned Prometheus datasource + Heimcall dashboards.
  # Login admin/admin (anonymous viewer also enabled). Web UI -> http://localhost:3000.
  # network_mode: host so the datasource reaches Prometheus at localhost:9090 (same firewalld reason).
  grafana:
    image: grafana/grafana:11.1.0
    network_mode: host
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafanadata:
