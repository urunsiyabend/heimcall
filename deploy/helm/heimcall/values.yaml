# Heimcall fleet — one Deployment + Service per microservice, optional HPA.
# Service images: heimcall/<service>:<tag> (built from each service's Dockerfile).

image:
  repository: heimcall
  tag: 0.0.1-SNAPSHOT
  pullPolicy: IfNotPresent

# Shared infra endpoints. Point these at in-cluster Services or external hosts.
# Postgres/Kafka/Redis/Jaeger are NOT part of this chart — bring your own (or run
# the compose deps); this chart deploys only the Heimcall services.
infra:
  kafkaBootstrapServers: kafka:9092
  otlpTracingEndpoint: http://jaeger-collector:4318/v1/traces
  postgresHost: postgres
  postgresPort: "5432"
  redisHost: redis
  redisPort: "6379"
  uiOrigin: http://localhost:5173

# Secrets. Defaults are DEV-ONLY — override in real envs (--set / sealed secret / external secret).
# db username + password default to the db name (matches the compose initdb roles);
# override per service under secrets.db.<service>.{username,password}.
#
# Phase 16 T1: JWTs are RS256. identity-service is the sole signer (holds jwtPrivateKey); every other
# service verifies via its JWKS endpoint. jwtPrivateKey is a one-line PKCS#8 PEM (\n-escaped). The dev key
# below is for local use ONLY — override jwtPrivateKey + jwtKeyId from a real Secret/KMS in production.
