# Applied to every service unless overridden in the per-service block below.
defaults:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 768Mi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

# Probe tuning shared by all services. startupProbe shields slow JVM+Flyway boot;
# liveness/readiness only take over once startup passes.
probes:
  startup:
    failureThreshold: 30
    periodSeconds: 5
  liveness:
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    periodSeconds: 10
    failureThreshold: 3

# Per-service overrides. `db` omitted => no datasource env injected (api-gateway).
services:
  api-gateway:
    port: 8080
    serviceType: LoadBalancer
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
  identity-service:
    port: 8083
    db: identity
  service-catalog-service:
    port: 8084
    db: catalog
  schedule-service:
    port: 8085
    db: schedule
  integration-service:
    port: 8081
    db: integration
  incident-service:
    port: 8082
    db: incident
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
  escalation-service:
    port: 8086
    db: escalation
  notification-service:
    port: 8087
    db: notification
