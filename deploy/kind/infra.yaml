apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: heimcall
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: incident }
            - { name: POSTGRES_PASSWORD, value: incident }
            - { name: POSTGRES_DB, value: incident }
          ports: [{ containerPort: 5432 }]
          volumeMounts:
            - { name: initdb, mountPath: /docker-entrypoint-initdb.d }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "incident"] }
            periodSeconds: 5
      volumes:
        - name: initdb
          configMap: { name: pg-initdb }
---
apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: heimcall }
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: heimcall
spec:
  replicas: 1
  selector: { matchLabels: { app: kafka } }
  template:
    metadata: { labels: { app: kafka } }
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.8.1  # official KRaft image; self-formats storage on first boot
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@localhost:9093" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0" }
          ports: [{ containerPort: 9092 }]
          readinessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata: { name: kafka, namespace: heimcall }
spec:
  selector: { app: kafka }
  ports: [{ port: 9092, targetPort: 9092 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: heimcall
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            tcpSocket: { port: 6379 }
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: heimcall }
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: heimcall
spec:
  replicas: 1
  selector: { matchLabels: { app: jaeger } }
  template:
    metadata: { labels: { app: jaeger } }
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.57
          env:
            - { name: COLLECTOR_OTLP_ENABLED, value: "true" }
          ports:
            - { containerPort: 4318 }
            - { containerPort: 16686 }
---
apiVersion: v1
kind: Service
metadata: { name: jaeger-collector, namespace: heimcall }
spec:
  selector: { app: jaeger }
  ports:
    - { name: otlp-http, port: 4318, targetPort: 4318 }
    - { name: ui, port: 16686, targetPort: 16686 }
