server:
  port: 8082

spring:
  application:
    name: incident-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/incident}
    username: ${DB_USERNAME:incident}
    password: ${DB_PASSWORD:incident}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: incident-service.alert-received-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # ErrorHandlingDeserializer wraps the JSON deserializer so a malformed payload
      # surfaces as a DeserializationException (-> routed to the DLT) instead of
      # crashing the listener and blocking the partition.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.urunsiyabend.heimcall.common.events,com.urunsiyabend.heimcall.common.domain"
        spring.json.value.default.type: com.urunsiyabend.heimcall.common.events.AlertReceivedEvent
        spring.json.use.type.headers: false
    producer:
      properties:
        # Propagate the correlation id onto outbound incident lifecycle events.
        interceptor.classes: com.urunsiyabend.heimcall.common.observability.CorrelationProducerInterceptor
  # Phase 16 T3: client_credentials registrations for the callees this service talks to. One registration per
  # callee (named after it), so each token's single audience opens only that service. client-id is this
  # service; the dev secret is weak/visible and overridden in prod via HEIMCALL_CLIENT_SECRET_INCIDENT.
  security:
    oauth2:
      client:
        provider:
          heimcall:
            token-uri: ${HEIMCALL_TOKEN_URI:http://localhost:8083/oauth2/token}
        registration:
          identity:
            provider: heimcall
            client-id: incident
            client-secret: ${HEIMCALL_CLIENT_SECRET_INCIDENT:dev-incident-secret}
            authorization-grant-type: client_credentials
            client-authentication-method: client_secret_basic
            scope: identity.membership.read
          catalog:
            provider: heimcall
            client-id: incident
            client-secret: ${HEIMCALL_CLIENT_SECRET_INCIDENT:dev-incident-secret}
            authorization-grant-type: client_credentials
            client-authentication-method: client_secret_basic
            scope: catalog.routing.resolve

catalog:
  base-url: ${CATALOG_BASE_URL:http://localhost:8084}

identity:
  base-url: ${IDENTITY_BASE_URL:http://localhost:8083}

# Verify RS256 user tokens via identity-service's JWKS (Phase 16 T1; no shared secret). Override host in k8s.
heimcall:
  jwt:
    jwks-uri: ${HEIMCALL_JWT_JWKS_URI:http://localhost:8083/v1/.well-known/jwks.json}
  # Phase 10 T4 routing availability cache: audit-only reconciliation of incidents paged from the
  # last-known-good cache during a catalog outage. Scoped to routed_from_cache incidents (not a full
  # cache sweep); capped per cycle, aborts if catalog is still down.
  routing:
    reconcile:
      interval-ms: ${HEIMCALL_ROUTING_RECONCILE_INTERVAL_MS:900000}
      batch-size: ${HEIMCALL_ROUTING_RECONCILE_BATCH_SIZE:200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
