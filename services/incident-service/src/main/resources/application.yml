server:
  port: 8082

spring:
  application:
    name: incident-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/incident}
    username: ${DB_USERNAME:incident}
    password: ${DB_PASSWORD:incident}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: incident-service.alert-received-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # ErrorHandlingDeserializer wraps the JSON deserializer so a malformed payload
      # surfaces as a DeserializationException (-> routed to the DLT) instead of
      # crashing the listener and blocking the partition.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.urunsiyabend.heimcall.common.events,com.urunsiyabend.heimcall.common.domain"
        spring.json.value.default.type: com.urunsiyabend.heimcall.common.events.AlertReceivedEvent
        spring.json.use.type.headers: false
    producer:
      properties:
        # Propagate the correlation id onto outbound incident lifecycle events.
        interceptor.classes: com.urunsiyabend.heimcall.common.observability.CorrelationProducerInterceptor

catalog:
  base-url: ${CATALOG_BASE_URL:http://localhost:8084}

identity:
  base-url: ${IDENTITY_BASE_URL:http://localhost:8083}

# Shared HS256 secret (min 32 bytes). MUST match every service; override in real envs.
heimcall:
  jwt:
    secret: ${HEIMCALL_JWT_SECRET:dev-only-heimcall-jwt-secret-change-me-32b+}
    access-ttl: ${HEIMCALL_JWT_ACCESS_TTL:PT1H}
    refresh-ttl: ${HEIMCALL_JWT_REFRESH_TTL:P30D}
  # Phase 10 T4 routing availability cache: audit-only reconciliation of incidents paged from the
  # last-known-good cache during a catalog outage. Scoped to routed_from_cache incidents (not a full
  # cache sweep); capped per cycle, aborts if catalog is still down.
  routing:
    reconcile:
      interval-ms: ${HEIMCALL_ROUTING_RECONCILE_INTERVAL_MS:900000}
      batch-size: ${HEIMCALL_ROUTING_RECONCILE_BATCH_SIZE:200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
