server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      # CORS for the browser UI. allow-credentials=true forbids "*" origin, so the dev origin is explicit.
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: ${HEIMCALL_UI_ORIGIN:http://localhost:5173}
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true
      routes:
        # More specific catalog/schedule routes must precede identity's /v1/organizations/** route.
        # Upstream URIs are env-overridable so the gateway resolves cluster Service DNS
        # in k8s (e.g. CATALOG_URI=http://service-catalog-service:8084); defaults stay local.
        - id: service-catalog-service
          uri: ${CATALOG_URI:http://localhost:8084}
          predicates:
            - Path=/v1/organizations/*/services/**,/v1/organizations/*/routing-default,/v1/organizations/*/routing-rules/**
        - id: schedule-service
          uri: ${SCHEDULE_URI:http://localhost:8085}
          predicates:
            - Path=/v1/organizations/*/schedules/**
        - id: escalation-service
          uri: ${ESCALATION_URI:http://localhost:8086}
          predicates:
            - Path=/v1/organizations/*/escalation-policies/**
        # Notification routes are nested under /v1/organizations/** so must precede the identity route.
        - id: notification-service
          uri: ${NOTIFICATION_URI:http://localhost:8087}
          predicates:
            - Path=/v1/organizations/*/users/*/contact-methods/**,/v1/organizations/*/deliveries/**
        - id: identity-service
          uri: ${IDENTITY_URI:http://localhost:8083}
          predicates:
            - Path=/v1/auth/**,/v1/organizations/**,/v1/users/**,/v1/integration-keys/**
        - id: integration-service
          uri: ${INTEGRATION_URI:http://localhost:8081}
          predicates:
            - Path=/v1/integrations/**
          # Phase 14 T1 / reviewed Phase 20 T4: Redis token-bucket rate limit, keyed per integrationKey.
          # Over-limit -> 429.
          #
          # Deliberate first ceiling: aggregate accept throughput is ~ replenishRate x (active keys). With
          # the conservative dev default (5/s) and a 20-key load profile that is ~100/s — intentionally the
          # first wall in the chain, and (pre-Phase-20) it sat below the downstream delivery capacity. It is
          # NOT a capacity limit: raise it for a load run with no code change via RL_REPLENISH_RATE /
          # RL_BURST_CAPACITY (e.g. RL_REPLENISH_RATE=1000 to exercise the chain past 100/s).
          #
          # Keyed per integrationKey, not per org: the org is not known at the gateway without a key->org
          # resolve round-trip to identity (async in the reactive filter -> added latency + the very coupling
          # the ingest path avoids). The integration key is the natural tenant-proxy here (issued per
          # integration per org), so per-key throttling isolates tenants without that lookup. Per-org fairness
          # (one tenant's many keys sharing one bucket) is a downstream concern, enforced where org is known
          # (integration-service post-resolve), not at the edge.
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@integrationKeyResolver}"
                redis-rate-limiter.replenishRate: ${RL_REPLENISH_RATE:5}
                redis-rate-limiter.burstCapacity: ${RL_BURST_CAPACITY:10}
                redis-rate-limiter.requestedTokens: 1
        - id: incident-service
          uri: ${INCIDENT_URI:http://localhost:8082}
          predicates:
            - Path=/v1/incidents/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
