server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: http://localhost:8083
          predicates:
            - Path=/v1/organizations/**,/v1/users/**,/v1/integration-keys/**
        - id: integration-service
          uri: http://localhost:8081
          predicates:
            - Path=/v1/integrations/**
        - id: incident-service
          uri: http://localhost:8082
          predicates:
            - Path=/v1/incidents/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
