server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      # CORS for the browser UI. allow-credentials=true forbids "*" origin, so the dev origin is explicit.
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: ${HEIMCALL_UI_ORIGIN:http://localhost:5173}
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true
      routes:
        # More specific catalog/schedule routes must precede identity's /v1/organizations/** route.
        # Upstream URIs are env-overridable so the gateway resolves cluster Service DNS
        # in k8s (e.g. CATALOG_URI=http://service-catalog-service:8084); defaults stay local.
        - id: service-catalog-service
          uri: ${CATALOG_URI:http://localhost:8084}
          predicates:
            - Path=/v1/organizations/*/services/**,/v1/organizations/*/routing-default
        - id: schedule-service
          uri: ${SCHEDULE_URI:http://localhost:8085}
          predicates:
            - Path=/v1/organizations/*/schedules/**
        - id: escalation-service
          uri: ${ESCALATION_URI:http://localhost:8086}
          predicates:
            - Path=/v1/organizations/*/escalation-policies/**
        # Notification routes are nested under /v1/organizations/** so must precede the identity route.
        - id: notification-service
          uri: ${NOTIFICATION_URI:http://localhost:8087}
          predicates:
            - Path=/v1/organizations/*/users/*/contact-methods/**,/v1/organizations/*/deliveries/**
        - id: identity-service
          uri: ${IDENTITY_URI:http://localhost:8083}
          predicates:
            - Path=/v1/auth/**,/v1/organizations/**,/v1/users/**,/v1/integration-keys/**
        - id: integration-service
          uri: ${INTEGRATION_URI:http://localhost:8081}
          predicates:
            - Path=/v1/integrations/**
          # Phase 14 T1: Redis token-bucket rate limit, keyed per integrationKey. Over-limit -> 429.
          # Conservative dev defaults; override via RL_REPLENISH_RATE / RL_BURST_CAPACITY.
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@integrationKeyResolver}"
                redis-rate-limiter.replenishRate: ${RL_REPLENISH_RATE:5}
                redis-rate-limiter.burstCapacity: ${RL_BURST_CAPACITY:10}
                redis-rate-limiter.requestedTokens: 1
        - id: incident-service
          uri: ${INCIDENT_URI:http://localhost:8082}
          predicates:
            - Path=/v1/incidents/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
