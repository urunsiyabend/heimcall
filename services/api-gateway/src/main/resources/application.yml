server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # More specific catalog/schedule routes must precede identity's /v1/organizations/** route.
        - id: service-catalog-service
          uri: http://localhost:8084
          predicates:
            - Path=/v1/organizations/*/services/**
        - id: schedule-service
          uri: http://localhost:8085
          predicates:
            - Path=/v1/organizations/*/schedules/**
        - id: escalation-service
          uri: http://localhost:8086
          predicates:
            - Path=/v1/organizations/*/escalation-policies/**
        - id: identity-service
          uri: http://localhost:8083
          predicates:
            - Path=/v1/organizations/**,/v1/users/**,/v1/integration-keys/**
        - id: integration-service
          uri: http://localhost:8081
          predicates:
            - Path=/v1/integrations/**
        - id: incident-service
          uri: http://localhost:8082
          predicates:
            - Path=/v1/incidents/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
