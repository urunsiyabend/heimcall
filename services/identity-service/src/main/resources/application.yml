server:
  port: 8083

spring:
  application:
    name: identity-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/identity}
    username: ${DB_USERNAME:identity}
    password: ${DB_PASSWORD:identity}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

# Shared HS256 secret (min 32 bytes). MUST be the same value on every service; override in real envs.
heimcall:
  jwt:
    secret: ${HEIMCALL_JWT_SECRET:dev-only-heimcall-jwt-secret-change-me-32b+}
    access-ttl: ${HEIMCALL_JWT_ACCESS_TTL:PT1H}
    refresh-ttl: ${HEIMCALL_JWT_REFRESH_TTL:P30D}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
