server:
  port: 8083

spring:
  application:
    name: identity-service
  # Local runs default to the 'dev' profile, which supplies weak, visible service-client secrets
  # (application-dev.yml). Any other profile (e.g. prod) must provide every HEIMCALL_CLIENT_SECRET_* or the
  # context fails to start — there is no secret fall-through outside dev.
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/identity}
    username: ${DB_USERNAME:identity}
    password: ${DB_PASSWORD:identity}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

# RS256 issuer (Phase 16 T1). identity-service is the ONLY holder of the private key; it signs user (and,
# from T2, service) tokens and publishes the matching public keys at /v1/.well-known/jwks.json. Every other
# service verifies via that JWKS — there is no shared secret. The dev key below is committed for local use
# only; in real envs set HEIMCALL_JWT_PRIVATE_KEY (PEM, PKCS#8) from a Secret/KMS and rotate via key-id.
heimcall:
  jwt:
    issuer: ${HEIMCALL_JWT_ISSUER:https://identity.heimcall.internal}
    private-key: ${HEIMCALL_JWT_PRIVATE_KEY:}
    private-key-location: ${HEIMCALL_JWT_PRIVATE_KEY_LOCATION:classpath:dev/jwt-dev-private-key.pem}
    key-id: ${HEIMCALL_JWT_KEY_ID:heimcall-dev-1}
    retired-public-key: ${HEIMCALL_JWT_RETIRED_PUBLIC_KEY:}
    retired-key-id: ${HEIMCALL_JWT_RETIRED_KEY_ID:}
    access-ttl: ${HEIMCALL_JWT_ACCESS_TTL:PT1H}
    refresh-ttl: ${HEIMCALL_JWT_REFRESH_TTL:P30D}
    # Phase 16 T3 — this service's own aud for inbound service tokens. identity is the callee for the
    # membership/team/team-members internal lookups and the integration-key resolve call; its internal
    # endpoints accept only service tokens minted with aud=identity (scope pinned per endpoint).
    service-name: ${HEIMCALL_SERVICE_NAME:identity}
  # Phase 16 T2 — service (client_credentials) clients. identity-service mints short-lived RS256 service
  # tokens at POST /oauth2/token (client_secret_basic). The caller→scope matrix is authoritative IN CODE
  # (AuthorizationServerConfig.CLIENT_SCOPES); only secrets are config here. Secrets have NO fallback: a
  # non-dev profile must inject every HEIMCALL_CLIENT_SECRET_* (Kubernetes Secret) or boot fails. The 'dev'
  # profile (default for local runs) fills weak, visible values — see application-dev.yml.
  service-token-ttl: ${HEIMCALL_SERVICE_TOKEN_TTL:PT5M}
  service-client-secrets:
    incident: ${HEIMCALL_CLIENT_SECRET_INCIDENT:}
    escalation: ${HEIMCALL_CLIENT_SECRET_ESCALATION:}
    integration: ${HEIMCALL_CLIENT_SECRET_INTEGRATION:}
    catalog: ${HEIMCALL_CLIENT_SECRET_CATALOG:}
    schedule: ${HEIMCALL_CLIENT_SECRET_SCHEDULE:}
    notification: ${HEIMCALL_CLIENT_SECRET_NOTIFICATION:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
