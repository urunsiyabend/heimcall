server:
  port: 8084

spring:
  application:
    name: service-catalog-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/catalog}
    username: ${DB_USERNAME:catalog}
    password: ${DB_PASSWORD:catalog}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  # Phase 16 T3: client_credentials registrations. "identity" carries membership + team scopes (one aud);
  # "escalation" carries the policy scope. client-id is this service; dev secret overridden in prod.
  security:
    oauth2:
      client:
        provider:
          heimcall:
            token-uri: ${HEIMCALL_TOKEN_URI:http://localhost:8083/oauth2/token}
        registration:
          identity:
            provider: heimcall
            client-id: catalog
            client-secret: ${HEIMCALL_CLIENT_SECRET_CATALOG:dev-catalog-secret}
            authorization-grant-type: client_credentials
            client-authentication-method: client_secret_basic
            scope: identity.membership.read,identity.team.read
          escalation:
            provider: heimcall
            client-id: catalog
            client-secret: ${HEIMCALL_CLIENT_SECRET_CATALOG:dev-catalog-secret}
            authorization-grant-type: client_credentials
            client-authentication-method: client_secret_basic
            scope: escalation.policy.read

identity:
  base-url: ${IDENTITY_BASE_URL:http://localhost:8083}

escalation:
  base-url: ${ESCALATION_BASE_URL:http://localhost:8086}

# Verify RS256 user tokens via identity-service's JWKS (Phase 16 T1; no shared secret). Override host in k8s.
heimcall:
  jwt:
    jwks-uri: ${HEIMCALL_JWT_JWKS_URI:http://localhost:8083/v1/.well-known/jwks.json}
    # Phase 16 T3: this service's aud as a callee — incident calls its routing-resolve with a service token
    # minted for aud=catalog (scope catalog.routing.resolve).
    service-name: ${HEIMCALL_SERVICE_NAME:catalog}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
