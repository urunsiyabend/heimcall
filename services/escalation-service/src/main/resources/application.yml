server:
  port: 8086

spring:
  application:
    name: escalation-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/escalation}
    username: ${DB_USERNAME:escalation}
    password: ${DB_PASSWORD:escalation}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      # Phase 20 T2: one consumer thread per partition of incident.lifecycle.v1 (keyed by incidentId, so
      # per-incident lifecycle order is preserved within a partition). Effective parallelism is
      # min(concurrency, partitions); keep aligned with heimcall.incident-lifecycle-topic.partitions.
      concurrency: ${ESCALATION_INCIDENT_CONSUMER_CONCURRENCY:4}
    consumer:
      group-id: escalation-service.incident-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # ErrorHandlingDeserializer wraps JSON so a poison-pill is routed to the DLT instead of
      # blocking the partition. Three incident topics carry three event types, so the concrete
      # type is taken from the producer's type header (use.type.headers=true).
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.urunsiyabend.heimcall.common.events,com.urunsiyabend.heimcall.common.domain"
        spring.json.use.type.headers: true
    producer:
      properties:
        # Propagate the correlation id onto outbound notification.requested events.
        interceptor.classes: com.urunsiyabend.heimcall.common.observability.CorrelationProducerInterceptor
  # Phase 16 T3: client_credentials registrations. "identity" carries all three identity scopes (one aud);
  # "schedule" carries the on-call scope. client-id is this service; dev secret overridden in prod.
  security:
    oauth2:
      client:
        provider:
          heimcall:
            token-uri: ${HEIMCALL_TOKEN_URI:http://localhost:8083/oauth2/token}
        registration:
          identity:
            provider: heimcall
            client-id: escalation
            client-secret: ${HEIMCALL_CLIENT_SECRET_ESCALATION:dev-escalation-secret}
            authorization-grant-type: client_credentials
            client-authentication-method: client_secret_basic
            scope: identity.membership.read,identity.team.read,identity.team-members.read
          schedule:
            provider: heimcall
            client-id: escalation
            client-secret: ${HEIMCALL_CLIENT_SECRET_ESCALATION:dev-escalation-secret}
            authorization-grant-type: client_credentials
            client-authentication-method: client_secret_basic
            scope: schedule.on-call.read

identity:
  base-url: ${IDENTITY_BASE_URL:http://localhost:8083}
schedule:
  base-url: ${SCHEDULE_BASE_URL:http://localhost:8085}

escalation:
  # How often the worker scans for due escalation tasks.
  worker:
    poll-interval-ms: ${ESCALATION_POLL_INTERVAL_MS:5000}

# Verify RS256 user tokens via identity-service's JWKS (Phase 16 T1; no shared secret). Override host in k8s.
heimcall:
  jwt:
    jwks-uri: ${HEIMCALL_JWT_JWKS_URI:http://localhost:8083/v1/.well-known/jwks.json}
    # Phase 16 T3: this service's aud as a callee — catalog calls its escalation-policy lookup with a
    # service token minted for aud=escalation (scope escalation.policy.read).
    service-name: ${HEIMCALL_SERVICE_NAME:escalation}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
