server:
  port: 8085

spring:
  application:
    name: schedule-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/schedule}
    username: ${DB_USERNAME:schedule}
    password: ${DB_PASSWORD:schedule}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

identity:
  base-url: ${IDENTITY_BASE_URL:http://localhost:8083}

# Verify RS256 user tokens via identity-service's JWKS (Phase 16 T1; no shared secret). Override host in k8s.
heimcall:
  jwt:
    jwks-uri: ${HEIMCALL_JWT_JWKS_URI:http://localhost:8083/v1/.well-known/jwks.json}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
