server:
  port: 8085

spring:
  application:
    name: schedule-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/schedule}
    username: ${DB_USERNAME:schedule}
    password: ${DB_PASSWORD:schedule}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

identity:
  base-url: ${IDENTITY_BASE_URL:http://localhost:8083}

# Shared HS256 secret (min 32 bytes). MUST match every service; override in real envs.
heimcall:
  jwt:
    secret: ${HEIMCALL_JWT_SECRET:dev-only-heimcall-jwt-secret-change-me-32b+}
    access-ttl: ${HEIMCALL_JWT_ACCESS_TTL:PT1H}
    refresh-ttl: ${HEIMCALL_JWT_REFRESH_TTL:P30D}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
