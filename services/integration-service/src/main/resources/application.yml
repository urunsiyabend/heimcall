server:
  port: 8081

spring:
  application:
    name: integration-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/integration}
    username: ${DB_USERNAME:integration}
    password: ${DB_PASSWORD:integration}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Reliability: wait for all in-sync replicas, retry, and never lose ordering/dupes silently.
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: true
        enable.idempotence: true
        # Propagate the correlation id from the producing request onto every outbound record.
        interceptor.classes: com.urunsiyabend.heimcall.common.observability.CorrelationProducerInterceptor

identity:
  base-url: ${IDENTITY_BASE_URL:http://localhost:8083}

# Verify RS256 user tokens via identity-service's JWKS (Phase 16 T1; no shared secret). Override host in k8s.
heimcall:
  jwt:
    jwks-uri: ${HEIMCALL_JWT_JWKS_URI:http://localhost:8083/v1/.well-known/jwks.json}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
