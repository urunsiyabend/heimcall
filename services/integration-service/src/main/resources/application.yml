server:
  port: 8081

spring:
  application:
    name: integration-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/integration}
    username: ${DB_USERNAME:integration}
    password: ${DB_PASSWORD:integration}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Reliability: wait for all in-sync replicas, retry, and never lose ordering/dupes silently.
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: true
        enable.idempotence: true

identity:
  base-url: ${IDENTITY_BASE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
