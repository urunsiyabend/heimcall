server:
  port: 8081

spring:
  application:
    name: integration-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/integration}
    username: ${DB_USERNAME:integration}
    password: ${DB_PASSWORD:integration}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Reliability: wait for all in-sync replicas, retry, and never lose ordering/dupes silently.
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: true
        enable.idempotence: true
        # Propagate the correlation id from the producing request onto every outbound record.
        interceptor.classes: com.urunsiyabend.heimcall.common.observability.CorrelationProducerInterceptor

identity:
  base-url: ${IDENTITY_BASE_URL:http://localhost:8083}

# Shared HS256 secret (min 32 bytes). MUST match every service; override in real envs.
heimcall:
  jwt:
    secret: ${HEIMCALL_JWT_SECRET:dev-only-heimcall-jwt-secret-change-me-32b+}
    access-ttl: ${HEIMCALL_JWT_ACCESS_TTL:PT1H}
    refresh-ttl: ${HEIMCALL_JWT_REFRESH_TTL:P30D}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
